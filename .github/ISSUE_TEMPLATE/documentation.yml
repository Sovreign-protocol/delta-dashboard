name: Documentation
description: Report issues or suggest improvements to documentation
title: "[Docs] "
labels: ["documentation", "needs triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve our documentation!
  - type: dropdown
    id: type
    attributes:
      label: Type of documentation issue
      options:
        - Typo or grammar mistake
        - Missing documentation
        - Outdated documentation
        - Unclear documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue in detail
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: URL or path to the documentation
